<div class="metric-row">
  <app-metric-card label="Avg. Wait Time" [value]="avgWaitTimeDisplay()" trend="Stable"></app-metric-card>
  <app-metric-card label="Active Workers" [value]="activeWorkersDisplay()" trend="Max Capacity"></app-metric-card>
</div>

<div class="card">
  <div class="card-title">Queue depth by priority</div>

  @for (item of priorityData(); track item.label) {
    <app-bar-chart
      [label]="item.label"
      [value]="item.value"
      [maxValue]="maxPriority()"
      [color]="item.color">
    </app-bar-chart>
  }
</div>

<div class="card">
  <div class="card-title">Queue depth by Message Type</div>

  @for (item of messageTypeData(); track item.label) {
    <app-bar-chart
      [label]="item.label"
      [value]="item.value"
      [maxValue]="maxMessageType()"
      [color]="item.color">
    </app-bar-chart>
  }
</div>

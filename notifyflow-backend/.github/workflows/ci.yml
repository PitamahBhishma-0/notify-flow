name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, notification-service, user-service, delivery-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: mvn clean verify -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/

  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [api-gateway, notification-service, user-service, delivery-service]

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/notifyflow-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/notifyflow-${{ matrix.service }}:${{ github.sha }}

  deploy-to-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy — api-gateway
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_GATEWAY }}"

      - name: Trigger Render deploy — notification-service
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_NOTIFICATION }}"

      - name: Trigger Render deploy — user-service
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_USER }}"

      - name: Trigger Render deploy — delivery-service
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_DELIVERY }}"
